name: Deploy to GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci || npm install

      - name: Install template dependencies
        run: npm install --prefix template/Untitled-Fresh-Out

      - name: TypeScript check
        run: npx tsc -b

      - name: Build main project
        run: npx vite build || true

      - name: Build template project
        run: npm run build --prefix template/Untitled-Fresh-Out || true

      - name: Copy fresh-out assets
        run: |
          mkdir -p dist/fresh-out
          if [ -d "template/Untitled-Fresh-Out/dist/public" ]; then
            cp -r template/Untitled-Fresh-Out/dist/public/* dist/fresh-out/
          fi

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
